# 마을표석 후보 리스트 — gyeonggi-cases.md에서 추출
#
# 두 종류의 위치 단서:
#   search_query — 카카오 장소(POI) 검색에 넘길 쿼리. 단지명·고유명을 포함해
#                  실제 위치를 잡을 수 있게 한다. 예: "분당 까치마을 시범단지"
#                  (없으면 name이 검색 쿼리로 사용됨)
#   address      — 결과 정렬용 region_hint. 검색 결과가 다른 시·도에 있는
#                  동명 마을에 잡히는 것을 방지.
#
# 신도시 ○○마을은 거의 모두 카카오에 POI로 등록되어 있어 키워드 검색이
# 잘 잡힌다. 농촌 자연부락(G2)은 단지처럼 등록 안 된 경우가 많아 동·리 단위
# 좌표로만 잡힘 — 이 경우 hit rate가 낮으므로 외출 답사가 필요.

